<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal dos Lagos — Loteamento Residencial em Jundiaí | Imobiliária Japi</title>
<meta name="description" content="Portal dos Lagos — loteamento residencial em Jundiaí. Realização Santa Angela, Capital e Mac Lucer. Conheça com a Imobiliária Japi.">
<style>
  html, body { margin: 0; padding: 0; background: #0d2930; }
  #frame { display: block; border: 0; width: 100%; }
  /* incorporado no Wix: o conteudo cresce e quem rola e a pagina do Wix */
  html.embedded, body.embedded { overflow: hidden; scrollbar-width: none; -ms-overflow-style: none; }
  html.embedded::-webkit-scrollbar, body.embedded::-webkit-scrollbar { width: 0; height: 0; display: none; }
  /* aberto direto (github): preenche a viewport e rola por dentro */
  html:not(.embedded), body:not(.embedded) { height: 100%; }
  html:not(.embedded) #frame { height: 100vh; }
</style>
</head>
<body>
<iframe id="frame" src="Portal%20dos%20Lagos%20-%20Wix.html" title="Portal dos Lagos"></iframe>
<script>
(function () {
  var EMBEDDED = window.self !== window.top;
  if (EMBEDDED) {
    document.documentElement.classList.add('embedded');
    document.body.classList.add('embedded');
  }

  var FIX_CSS =
    'html.embedded .hero{min-height:680px}' +
    'html.embedded .scroll-cue{display:none}' +
    'html.embedded{overflow-x:hidden!important}' +
    /* aberto direto: rola por dentro com a barra escondida */
    'html:not(.embedded){height:100%!important;overflow-y:auto!important;overflow-x:hidden!important}' +
    'html,body{scrollbar-width:none!important;-ms-overflow-style:none!important}' +
    'html::-webkit-scrollbar,body::-webkit-scrollbar{width:0!important;height:0!important;display:none!important}' +
    /* rodape: logo (Santa Angela / Capital / Mac Lucer) sem corte */
    '.foot .sa{display:flex;flex-direction:column;align-items:flex-start;gap:8px;margin-top:14px}' +
    '.foot .sa img{height:110px;width:auto;max-width:100%;object-fit:contain;display:block;margin-left:-10px}' +
    /* mobile harmonioso */
    '@media (max-width:620px){.foot .sa img{height:88px}}';

  var f = document.getElementById('frame');
  var lastH = 0;

  function apply() {
    var d;
    try { d = f.contentDocument || (f.contentWindow && f.contentWindow.document); }
    catch (e) { return; }              // cross-origin (so em file://) — ignora
    if (!d || !d.documentElement) return;
    if (EMBEDDED) d.documentElement.classList.add('embedded');
    if (!d.getElementById('__embed_fix')) {
      var s = d.createElement('style');
      s.id = '__embed_fix';
      s.textContent = FIX_CSS;
      (d.head || d.documentElement).appendChild(s);
    }

    if (EMBEDDED) {
      // mede a altura real da landing e propaga (iframe + pagina pai/Wix)
      var h = Math.max(
        d.body ? d.body.scrollHeight : 0,
        d.documentElement ? d.documentElement.scrollHeight : 0
      );
      if (h > 300 && Math.abs(h - lastH) > 2) {
        lastH = h;
        f.style.height = h + 'px';
        document.documentElement.style.height = h + 'px';
        document.body.style.height = h + 'px';
        try { window.parent.postMessage({ ptl: 1, height: h }, '*'); } catch (e) {}
      }
    }
  }

  f.addEventListener('load', apply);
  setInterval(apply, 400);
  window.addEventListener('resize', apply);
})();
</script>
</body>
</html>
